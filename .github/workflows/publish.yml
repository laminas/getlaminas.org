name: Publish to live

on:
  workflow_dispatch:

jobs:
  push-to-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: staging
          fetch-depth: 0
      - run: |
          git push origin origin/staging:master

